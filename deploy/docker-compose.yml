name: fairfield-events

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: events
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events -d events"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://events:${POSTGRES_PASSWORD}@db:5432/events
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  ingest:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://events:${POSTGRES_PASSWORD}@db:5432/events
    depends_on:
      db:
        condition: service_healthy
    # Poll all sources every 6h, then expire past events. Failures per-source
    # are isolated by the runner; this loop just keeps the schedule.
    command: >
      sh -c "while true; do
               python -m ingest.runner;
               python -m app.expire;
               sleep 21600;
             done"

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
